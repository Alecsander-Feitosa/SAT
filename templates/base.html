{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAT - Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { 
            /* A variável agora puxa dinamicamente a cor da torcida ou o bronze do SAT */
            --sat-tema: {{ cor_tema }}; 
        }
        body { font-family: 'Inter', sans-serif; background-color: FFFFFF !important; color: 1A1A1A; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Classes utilitárias dinâmicas */
        .bg-tema { background-color: var(--sat-tema) !important; }
        .text-tema { color: var(--sat-tema) !important; }
        .border-tema { border-color: var(--sat-tema) !important; }
    </style>
</head>
<body class="p-8 bg-sat-custom text-white">
    {% if user.is_authenticated %}
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] hidden transition-opacity" onclick="toggleSidebar()"></div>
    <div id="satSidebar" class="fixed inset-y-0 left-0 w-72 bg-white z-[101] shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out border-r border-gray-100 overflow-y-auto no-scrollbar">
        
        <div class="p-8 bg-[CD7F32] text-white">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md">
                    <i class="bi bi-person-fill text-2xl"></i>
                </div>
                <div>
                    <h4 class="font-black uppercase italic leading-none">{{ user.username }}</h4>
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Membro SAT</p>
                </div>
            </div>
        </div>

        <div class="p-4 space-y-2">
            <p class="px-4 text-[9px] font-black text-gray-400 uppercase tracking-widest my-4">Menu Principal</p>
            <a href="{% url 'dashboard' %}" class="flex items-center gap-4 px-4 py-4 rounded-2xl hover:bg-gray-50 no-underline group transition-all">
                <i class="bi bi-grid-1x2-fill text-[CD7F32] text-lg"></i>
                <span class="text-sm font-bold text-[1A1A1A]">Dashboard</span>
            </a>
            <a href="{% url 'mural' %}" class="flex items-center gap-4 px-4 py-4 rounded-2xl hover:bg-gray-50 no-underline group transition-all">
                <i class="bi bi-chat-quote-fill text-[CD7F32] text-lg"></i>
                <span class="text-sm font-bold text-[1A1A1A]">Mural Social</span>
            </a>
            <a href="{% url 'ranking' %}" class="flex items-center gap-4 px-4 py-4 rounded-2xl hover:bg-gray-50 no-underline group transition-all">
                <i class="bi bi-trophy-fill text-[CD7F32] text-lg"></i>
                <span class="text-sm font-bold text-[1A1A1A]">Ranking</span>
            </a>
            <hr class="border-gray-50 my-4">
            <a href="{% url 'login' %}" class="flex items-center gap-4 px-4 py-4 rounded-2xl hover:bg-red-50 no-underline text-red-500">
                <i class="bi bi-door-open-fill text-lg"></i>
                <span class="text-sm font-bold">Sair</span>
            </a>
        </div>
    </div>

    <div class="flex items-center justify-between px-5 py-4 bg-white sticky top-0 z-[50] border-b border-gray-100">
        <button onclick="toggleSidebar()" class="text-2xl text-[1A1A1A]"><i class="bi bi-list"></i></button>
        <span class="font-black italic text-[CD7F32]">SAT ELITE</span>
        <div class="w-8"></div> </div>
    {% endif %}

    <main class="{% if user.is_authenticated %}pb-28{% endif %}">
        {% block content %}{% endblock %}
    </main>

    {% if user.is_authenticated %}
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 py-3 flex justify-between items-center z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        
        <a href="{% url 'dashboard' %}" class="flex flex-col items-center gap-1 no-underline w-14 group">
            <i class="bi bi-house-door-fill text-2xl transition-colors {% if request.resolver_match.url_name == 'dashboard' %}text-tema{% else %}text-gray-300 group-hover:text-gray-400{% endif %}"></i>
            <span class="text-[8px] font-black uppercase tracking-widest transition-colors {% if request.resolver_match.url_name == 'dashboard' %}text-tema{% else %}text-gray-400{% endif %}">Home</span>
        </a>

        <a href="{% url 'loja' %}" class="flex flex-col items-center gap-1 no-underline w-14 group">
            <i class="bi bi-bag-fill text-2xl transition-colors {% if request.resolver_match.url_name == 'loja' %}text-tema{% else %}text-gray-300 group-hover:text-gray-400{% endif %}"></i>
            <span class="text-[8px] font-black uppercase tracking-widest transition-colors {% if request.resolver_match.url_name == 'loja' %}text-tema{% else %}text-gray-400{% endif %}">Loja</span>
        </a>
        
        <a href="{% url 'bet_manutencao' %}" class="flex flex-col items-center gap-1 no-underline w-14 group">
            <i class="bi bi-star-fill text-2xl transition-colors {% if request.resolver_match.url_name == 'beneficios_view' %}text-tema{% else %}text-gray-300 group-hover:text-gray-400{% endif %}"></i>
            <span class="text-[8px] font-black uppercase tracking-widest transition-colors {% if request.resolver_match.url_name == 'beneficios_view' %}text-tema{% else %}text-gray-400{% endif %}">Vantagens</span>
        </a>

        <a href="{% url 'bet_manutencao' %}" class="flex flex-col items-center gap-1 no-underline w-14 group">
            <i class="bi bi-dice-5-fill text-2xl transition-colors {% if request.resolver_match.url_name == 'bet_manutencao' %}text-tema{% else %}text-gray-300 group-hover:text-gray-400{% endif %}"></i>
            <span class="text-[8px] font-black uppercase tracking-widest transition-colors {% if request.resolver_match.url_name == 'bet_manutencao' %}text-tema{% else %}text-gray-400{% endif %}">BET</span>
        </a>
        
        <a href="{% url 'perfil' %}" class="flex flex-col items-center gap-1 no-underline w-14 group">
            <i class="bi bi-person-fill text-2xl transition-colors {% if request.resolver_match.url_name == 'perfil' %}text-tema{% else %}text-gray-300 group-hover:text-gray-400{% endif %}"></i>
            <span class="text-[8px] font-black uppercase tracking-widest transition-colors {% if request.resolver_match.url_name == 'perfil' %}text-tema{% else %}text-gray-400{% endif %}">Perfil</span>
        </a>

    </nav>
    {% endif %}

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('satSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }
    </script>
</body>
</html>
