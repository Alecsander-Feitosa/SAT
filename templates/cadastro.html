{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Oculta os menus */
    nav, #satSidebar, #sidebarOverlay, .sticky.top-0 { display: none !important; }
    body, main { padding: 0 !important; margin: 0 !important; background-color: #ffffff !important; }
    
    /* Estrutura base das caixas de texto */
    form input {
        width: 100%;
        color: #1a1a1a;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 1rem;
        /* O padding-right cria o espaço para o ícone não se sobrepor ao texto no lado direito */
        padding: 1rem 3.25rem 1rem 1.25rem; 
        outline: none;
        transition: all 0.3s ease;
    }
</style>

<div class="min-h-screen bg-white flex flex-col items-center px-6 py-8 relative overflow-hidden">
    
    <div class="absolute -top-24 -left-20 w-48 h-48 bg-[#D37129] opacity-10 rounded-full blur-3xl z-0"></div>
    <div class="absolute bottom-20 -right-20 w-48 h-48 bg-[#D37129] opacity-5 rounded-full blur-3xl z-0"></div>

    <div class="w-full flex justify-between items-center mb-8 relative z-10">
        <img src="{% static 'img/logo_sat.png' %}" alt="SAT Logo" class="h-12 object-contain">
        
        <a href="{% url 'login' %}" class="w-10 h-10 flex items-center justify-center bg-[#D37129]/10 text-[#D37129] hover:bg-[#D37129] hover:text-white rounded-full transition-colors active:scale-95 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </a>
    </div>

    <div class="w-full max-w-sm relative z-10 flex-1">
        
        <h2 class="text-2xl font-black text-[#D37129] text-center">Cadastro</h2>
        <p class="text-[10px] font-bold text-[#D37129] uppercase tracking-widest mb-6 mt-1 text-center">Preencha os dados da conta</p>

        <form method="post" action="{% url 'cadastro' %}" class="space-y-4">
            {% csrf_token %}

            <div class="relative">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                    <i class="bi bi-person text-gray-400 text-lg"></i>
                </div>
                <input type="text" name="nome" placeholder="Nome completo" class="bg-white border-2 border-[#D37129] focus:border-[#D37129] focus:ring-4 focus:ring-[#D37129]/20" required>
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                    <i class="bi bi-person-vcard text-gray-400 text-lg"></i>
                </div>
                <input type="text" name="cpf" placeholder="CPF" class="bg-white border-2 border-[#D37129] focus:border-[#D37129] focus:ring-4 focus:ring-[#D37129]/20" required>
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                    <i class="bi bi-envelope text-gray-400 text-lg"></i>
                </div>
                <input type="email" name="email" placeholder="E-mail" class="bg-white border-2 border-[#D37129] focus:border-[#D37129] focus:ring-4 focus:ring-[#D37129]/20" required>
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                    <i class="bi bi-phone text-gray-400 text-lg"></i>
                </div>
                <input type="tel" name="telefone" placeholder="Telefone" class="bg-white border-2 border-[#D37129] focus:border-[#D37129] focus:ring-4 focus:ring-[#D37129]/20" required>
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                    <i class="bi bi-lock text-gray-400 text-lg"></i>
                </div>
                <input type="password" name="senha" placeholder="Senha" class="bg-white border-2 border-black focus:border-black focus:ring-4 focus:ring-black/20" required>
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                    <i class="bi bi-shield-lock text-gray-400 text-lg"></i>
                </div>
                <input type="password" name="confirmar_senha" placeholder="Confirmar senha" class="bg-white border-2 border-black focus:border-black focus:ring-4 focus:ring-black/20" required>
            </div>

            <div class="flex items-start mt-6 mb-8 px-1 pt-2">
                <div class="flex items-center h-5">
                    <input id="terms" type="checkbox" class="w-4 h-4 text-[#D37129] bg-gray-100 border-2 border-gray-300 rounded focus:ring-[#D37129]" required>
                </div>
                <label for="terms" class="ml-3 text-[9px] font-bold text-gray-400 uppercase tracking-wider leading-relaxed" style="margin-top: 2px;">
                    Declaro que li e aceito os <br>
                    <a href="#" class="text-[#D37129] hover:underline font-black">termos e política de privacidade</a>.
                </label>
            </div>

            <button type="submit" class="w-full flex items-center justify-center gap-2 text-white bg-[#D37129] hover:bg-[#b85a1a] font-black rounded-full text-sm px-5 py-4 uppercase tracking-widest transition-all active:scale-95 shadow-xl shadow-[#D37129]/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
                Continuar
            </button>
        </form>

        <p class="text-xs font-bold text-gray-400 text-center mt-8 pb-10 uppercase tracking-wider">
            Já tem conta? <a href="{% url 'login' %}" class="text-[#D37129] hover:underline font-black">Fazer Login</a>
        </p>
    </div>
</div>
{% endblock %}
