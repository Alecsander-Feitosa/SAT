{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Mantemos o ecrã limpo como um fluxo de onboarding */
    nav, #satSidebar, #sidebarOverlay, .sticky.top-0 { display: none !important; }
    body, main { padding: 0 !important; margin: 0 !important; background-color: #ffffff !important; }

    /* Esconde o botão rádio (a bolinha padrão), vamos usar o cartão todo como botão */
    .torcida-radio { display: none; }
    
    /* Estilo do cartão inativo */
    .torcida-card {
        border: 2px solid #e5e7eb;
        background-color: #ffffff;
        transition: all 0.3s ease;
        cursor: pointer;
    }
    
    /* Quando o botão rádio oculto estiver selecionado (checked), o cartão muda de cor! */
    .torcida-radio:checked + .torcida-card {
        border-color: #D37129;
        background-color: #fffaf5; /* Laranja muito clarinho */
        box-shadow: 0 4px 15px rgba(211, 113, 41, 0.2);
        transform: scale(1.02);
    }
</style>

<div class="min-h-screen bg-white flex flex-col items-center px-4 py-8 relative overflow-hidden">
    
    <div class="absolute -top-24 -left-20 w-48 h-48 bg-[#D37129] opacity-10 rounded-full blur-3xl z-0 pointer-events-none"></div>
    <div class="absolute bottom-20 -right-20 w-48 h-48 bg-[#D37129] opacity-5 rounded-full blur-3xl z-0 pointer-events-none"></div>

    <div class="w-full flex justify-center mb-6 relative z-10">
        <img src="{% static 'img/logo_sat.png' %}" alt="SAT Logo" class="h-10 object-contain">
    </div>

    <div class="w-full max-w-md relative z-10 flex-1 flex flex-col">
        
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-black text-gray-900 uppercase tracking-tighter mb-1" style="font-family: 'Montserrat', sans-serif;">Etapa 2</h2>
            <p class="text-[10px] font-bold text-[#D37129] uppercase tracking-widest">Escolha a sua Torcida</p>
        </div>

        <form method="post" action="{% url 'cadastro_etapa2' %}" class="flex-grow flex flex-col" id="form-etapa2">
            {% csrf_token %}

            <div class="grid grid-cols-2 gap-4 mb-8 overflow-y-auto pr-1" style="max-height: 55vh;">
                {% for torcida in torcidas %}
                    <label class="block relative h-full">
                        <input type="radio" name="torcida_id" value="{{ torcida.id }}" class="torcida-radio" required>
                        
                        <div class="torcida-card rounded-2xl p-4 flex flex-col items-center justify-center text-center h-full">
                            {% if torcida.logo %}
                                <img src="{{ torcida.logo.url }}" alt="{{ torcida.nome }}" class="w-16 h-16 object-contain mb-3 drop-shadow-sm">
                            {% else %}
                                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3 text-gray-400 font-bold text-xl">
                                    {{ torcida.nome|slice:":2" }}
                                </div>
                            {% endif %}
                            <h3 class="text-xs font-black text-gray-800 uppercase tracking-wide leading-tight">{{ torcida.nome }}</h3>
                        </div>
                    </label>
                {% empty %}
                    <div class="col-span-2 text-center py-10">
                        <p class="text-gray-400 font-bold text-sm">Nenhuma torcida disponível no momento.</p>
                    </div>
                {% endfor %}
            </div>

            <div class="mt-auto pb-4">
                <button type="submit" class="w-full flex items-center justify-center gap-2 text-white bg-[#D37129] hover:bg-[#b85a1a] font-black rounded-full text-sm px-5 py-4 uppercase tracking-widest transition-all active:scale-95 shadow-xl shadow-[#D37129]/30">
                    Concluir Registo
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
                
                <p class="text-center text-[9px] text-gray-400 uppercase tracking-widest mt-4 font-bold">
                    Ao concluir, o seu pedido será enviado para a diretoria.
                </p>
            </div>
        </form>
        
    </div>
</div>
{% endblock %}
