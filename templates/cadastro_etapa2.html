{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Mantemos o ecrã limpo como um fluxo de onboarding */
    nav, #satSidebar, #sidebarOverlay, .sticky.top-0 { display: none !important; }
    body, main { padding: 0 !important; margin: 0 !important; background-color: #ffffff !important; }

    /* Esconde o botão rádio (a bolinha padrão), vamos usar o cartão todo como botão */
    .torcida-radio { display: none; }
    
    /* Estilo do cartão inativo */
    .torcida-card {
        border: 2px solid #e5e7eb;
        background-color: #ffffff;
        transition: all 0.3s ease;
        cursor: pointer;
    }
    
    /* Quando o botão rádio oculto estiver selecionado (checked), o cartão muda de cor! */
    .torcida-radio:checked + .torcida-card {
        border-color: #D37129;
        background-color: #fffaf5; /* Laranja muito clarinho */
        box-shadow: 0 4px 15px rgba(211, 113, 41, 0.2);
        transform: scale(1.02);
    }
</style>

<div class="min-h-screen bg-white flex flex-col items-center px-4 py-8 relative overflow-hidden">
    
    <div class="absolute -top-24 -left-20 w-48 h-48 bg-[#D37129] opacity-10 rounded-full blur-3xl z-0 pointer-events-none"></div>
    <div class="absolute bottom-20 -right-20 w-48 h-48 bg-[#D37129] opacity-5 rounded-full blur-3xl z-0 pointer-events-none"></div>

    <div class="w-full flex justify-center mb-6 relative z-10">
        <img src="{% static 'img/logo_sat.png' %}" alt="SAT Logo" class="h-10 object-contain">
    </div>

    <div class="w-full max-w-md relative z-10 flex-1 flex flex-col">
        
       <div class="mb-6 text-center">
            <h2 class="text-2xl font-black text-gray-900 uppercase tracking-tighter mb-1">Etapa 2</h2>
            <p class="text-[10px] font-bold text-[#D37129] uppercase tracking-widest">Escolha a sua Torcida ou continue como Neutro</p>
        </div>

        <div class="mb-4 relative z-10">
            <input type="text" id="searchTorcida" placeholder="Procurar Torcida..." 
                class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-[#D37129] outline-none transition-all text-sm font-medium">
        </div>

        <form method="post" action="{% url 'cadastro_etapa2' %}" class="flex-grow flex flex-col" id="form-etapa2">
            {% csrf_token %}

           <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Time do Coração</label>
                    <input list="lista-times" name="time_coracao" placeholder="Seu time..." 
                        class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-[#D37129] outline-none transition-all text-sm font-bold uppercase tracking-tight">
                    <datalist id="lista-times">
                        {% for time in times %}<option value="{{ time }}">{% endfor %}
                    </datalist>
                </div>

                <div>
                    <label for="data_nascimento" class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Data de Nascimento</label>
                    <input type="date" name="data_nascimento" id="data_nascimento" 
                        class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-[#D37129] outline-none transition-all text-sm font-bold text-gray-700"
                        required>
                </div>
            </div>

            <div class="mb-2">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Escolha a sua Torcida Organizada</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8 overflow-y-auto pr-1" style="max-height: 50vh;" id="torcidas-grid">
                <label class="block relative h-full torcida-item">
                    <input type="radio" name="torcida_id" value="neutro" class="torcida-radio">
                    <div class="torcida-card rounded-2xl p-4 flex flex-col items-center justify-center text-center h-full">
                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3 text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <h3 class="text-xs font-black text-gray-800 uppercase tracking-wide">Público Geral</h3>
                    </div>
                </label>

                {% for torcida in torcidas %}
                    <label class="block relative h-full torcida-item">
                        <input type="radio" name="torcida_id" value="{{ torcida.id }}" class="torcida-radio" required>
                        <div class="torcida-card rounded-2xl p-4 flex flex-col items-center justify-center text-center h-full">
                            {% if torcida.logo %}
                                <img src="{{ torcida.logo.url }}" alt="{{ torcida.nome }}" class="w-16 h-16 object-contain mb-3">
                            {% else %}
                                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3 text-gray-400 font-bold text-xl">
                                    {{ torcida.nome|slice:":2" }}
                                </div>
                            {% endif %}
                            <h3 class="text-xs font-black text-gray-800 uppercase tracking-wide">{{ torcida.nome }}</h3>
                        </div>
                    </label>
                {% endfor %}
            </div>
            
            <script>
                document.getElementById('searchTorcida').addEventListener('input', function(e) {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.torcida-item').forEach(item => {
                        const name = item.querySelector('h3').textContent.toLowerCase();
                        item.style.display = name.includes(term) ? 'block' : 'none';
                    });
                });
            </script>
            </form>
        
    </div>
</div>
{% endblock %}
