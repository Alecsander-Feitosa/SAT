<div id="checkin-container" style="text-align: center;">
    <h3>Check-in no Estádio</h3>
    
    {% if not user.is_authenticated %}
        <input type="text" id="nome_visitante" placeholder="Seu Nome/Apelido" class="form-control mb-2">
    {% endif %}

    <div id="camera-area" style="width: 100%; max-width: 400px; margin: auto;">
        <video id="video" width="100%" autoplay playsinline style="border-radius: 10px; background: #000;"></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <button id="btn-capturar" class="btn btn-primary mt-3">Confirmar Presença (Foto + GPS)</button>
    <p id="status-msg" class="mt-2"></p>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const btnCapturar = document.getElementById('btn-capturar');
const statusMsg = document.getElementById('status-msg');

// 1. Iniciar Câmera ao carregar a página
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
    .then(stream => { video.srcObject = stream; })
    .catch(err => { statusMsg.innerText = "Erro ao acessar câmera: " + err; });

btnCapturar.addEventListener('click', () => {
    statusMsg.innerText = "Localizando e processando...";
    
    // 2. Pegar Geolocalização
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(enviarCheckin, (erro) => {
            statusMsg.innerText = "Erro ao obter GPS. Ative a localização.";
        });
    }
});

function enviarCheckin(position) {
    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    // 3. Capturar frame do vídeo como imagem
    const context = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    canvas.toBlob((blob) => {
        const formData = new FormData();
        formData.append('latitude', lat);
        formData.append('longitude', lng);
        formData.append('foto', blob, 'selfie.jpg');
        formData.append('evento_id', "{{ evento.id }}"); // Passado pelo context do Django
        
        const nomeVisitante = document.getElementById('nome_visitante');
        if(nomeVisitante) formData.append('nome', nomeVisitante.value);

        // 4. Enviar para a View Django (CSRF Token necessário)
        fetch("{% url 'validar_checkin' %}", {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}' },
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'sucesso') {
                statusMsg.style.color = "green";
                statusMsg.innerText = data.mensagem;
            } else {
                statusMsg.style.color = "red";
                statusMsg.innerText = data.mensagem;
            }
        });
    }, 'image/jpeg');
}
</script>
