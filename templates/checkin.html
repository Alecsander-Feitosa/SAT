{% extends "base.html" %}
{% block content %}
<div class="bg-[#121212] min-h-screen pb-32 px-6 flex flex-col items-center justify-center text-center">
    {% if evento %}
        <div class="mb-8">
            <span class="text-[#D37129] font-black text-xs uppercase tracking-[4px]">Próximo Desafio</span>
            <h1 class="text-white text-3xl font-black italic uppercase mt-2">{{ evento.titulo }}</h1>
            <p class="text-gray-400 text-sm mt-1">{{ evento.local }}</p>
        </div>

        <button onclick="fazerCheckIn()" id="btnCheckin" class="w-48 h-48 rounded-full bg-transparent border-4 border-[#D37129] flex flex-col items-center justify-center shadow-[0_0_30px_rgba(211,113,41,0.3)] hover:scale-105 transition-all">
            <i class="bi bi-geo-alt-fill text-5xl text-[#D37129] mb-2"></i>
            <span class="text-white font-black text-xs uppercase tracking-widest">Validar<br>Presença</span>
        </button>

        <p id="status" class="text-gray-500 text-[10px] mt-6 uppercase font-bold tracking-tighter">
            Toque para ativar o radar de localização
        </p>
    {% else %}
        <p class="text-gray-500 font-bold uppercase">Nenhum evento ativo para check-in no momento.</p>
    {% endif %}
</div>

<script>
function fazerCheckIn() {
    const status = document.getElementById('status');
    status.innerText = "LOCALIZANDO...";
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            // Aqui enviamos para a sua view 'validar_checkin_estadio'
            const formData = new FormData();
            formData.append('latitude', pos.coords.latitude);
            formData.append('longitude', pos.coords.longitude);
            formData.append('evento_id', "{{ evento.id }}");
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            fetch("{% url 'validar_checkin' %}", {
                method: 'POST',
                body: formData
            }).then(r => r.json()).then(data => {
                if(data.status == 'sucesso') {
                    alert('BOA GUERREIRO! +50 XP NA CONTA!');
                    window.location.href = "{% url 'ranking' %}";
                } else {
                    alert(data.mensagem);
                }
            });
        });
    }
}
</script>
{% endblock %}
