{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="w-full min-h-screen fundo-app flex flex-col pb-32 px-5 pt-8">
    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'painel_loja' %}" class="w-10 h-10 fundo-card rounded-full flex items-center justify-center texto-main border border-suave shadow-sm">
            <i class="bi bi-arrow-left text-lg"></i>
        </a>
        <h1 class="text-xl font-black italic uppercase tracking-tighter texto-main leading-none">
            {% if produto %}EDITAR{% else %}NOVO{% endif %} <span class="texto-tema">PRODUTO</span>
        </h1>
    </div>

    <form method="POST" enctype="multipart/form-data" class="fundo-card border border-suave rounded-[25px] p-5 shadow-sm flex flex-col gap-5">
        {% csrf_token %}
        
        <div>
            <label class="text-[9px] font-black texto-main opacity-50 uppercase tracking-widest ml-2 mb-1 block">Nome do Produto</label>
            <input type="text" name="nome" value="{{ produto.nome|default:'' }}" required class="w-full bg-black/5 border border-suave rounded-xl py-3 px-4 texto-main text-sm focus:outline-none focus:border-tema">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[9px] font-black texto-main opacity-50 uppercase tracking-widest ml-2 mb-1 block">Preço (R$)</label>
                <input type="number" step="0.01" name="preco" value="{{ produto.preco|default:'' }}" required class="w-full bg-black/5 border border-suave rounded-xl py-3 px-4 texto-main text-sm focus:outline-none focus:border-tema">
            </div>
            <div>
                <label class="text-[9px] font-black texto-main opacity-50 uppercase tracking-widest ml-2 mb-1 block">Estoque</label>
                <input type="number" name="estoque" value="{{ produto.estoque|default:'0' }}" required class="w-full bg-black/5 border border-suave rounded-xl py-3 px-4 texto-main text-sm focus:outline-none focus:border-tema">
            </div>
        </div>

        <div>
            <label class="text-[9px] font-black texto-main opacity-50 uppercase tracking-widest ml-2 mb-1 block">Categoria</label>
            <input type="text" name="categoria" value="{{ produto.categoria|default:'' }}" placeholder="Ex: Camisas, Bonés..." required class="w-full bg-black/5 border border-suave rounded-xl py-3 px-4 texto-main text-sm focus:outline-none focus:border-tema">
        </div>

        <div>
            <label class="text-[9px] font-black texto-main opacity-50 uppercase tracking-widest ml-2 mb-1 block">Descrição</label>
            <textarea name="descricao" rows="3" class="w-full bg-black/5 border border-suave rounded-xl py-3 px-4 texto-main text-sm focus:outline-none focus:border-tema">{{ produto.descricao|default:'' }}</textarea>
        </div>

        <div class="flex items-center gap-3 bg-black/5 p-4 rounded-xl border border-suave">
            <input type="checkbox" name="destaque" id="destaque" {% if produto.destaque %}checked{% endif %} class="w-5 h-5 accent-[#D37129]">
            <label for="destaque" class="text-xs font-bold texto-main uppercase">Produto em Destaque (Hot)</label>
        </div>

        <div>
            <label class="text-[9px] font-black texto-main opacity-50 uppercase tracking-widest ml-2 mb-1 block">Imagem do Produto</label>
            <input type="file" name="imagem" accept="image/*" class="w-full bg-black/5 border border-suave rounded-xl py-2 px-4 texto-main text-xs">
            {% if produto.imagem %}
                <p class="text-[9px] texto-main opacity-40 mt-2 ml-2">Imagem atual: {{ produto.imagem.name }}</p>
            {% endif %}
        </div>

        <button type="submit" class="w-full py-4 mt-2 fundo-tema texto-claro rounded-xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-transform">
            Salvar Produto
        </button>
    </form>
</div>
{% endblock %}
