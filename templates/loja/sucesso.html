{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#F8F9FA] flex flex-col items-center justify-center px-10">
    <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6">
        <i class="bi bi-check-lg text-5xl"></i>
    </div>
    
    <h1 class="text-2xl font-black italic uppercase text-[#1A1A1A] text-center">
        PEDIDO <span class="text-[#D37129]">REALIZADO!</span>
    </h1>
    <p class="text-gray-500 text-center mt-2 text-sm font-bold uppercase">Número do Pedido: #{{ pedido.id }}</p>
    
    <div class="mt-10 w-full space-y-3">
        <a href="{% url 'hub' %}" class="block w-full py-4 bg-[#1a1c1e] text-white text-center rounded-2xl font-black italic uppercase text-xs">
            Voltar ao Hub
        </a>
        <a href="{% url 'loja' %}" class="block w-full py-4 border-2 border-[#1a1c1e] text-[#1a1c1e] text-center rounded-2xl font-black italic uppercase text-xs">
            Continuar Comprando
        </a>
    </div>
</div>
{% endblock %}
