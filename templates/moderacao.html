{% extends "base.html" %}
{% block content %}
<div class="min-h-screen bg-[#F8F9FA] p-5 pb-32">
    <div class="mb-8">
        <h1 class="text-2xl font-black italic uppercase text-[#1A1A1A]">Moderação</h1>
        <p class="text-[#D37129] text-[10px] font-bold uppercase tracking-widest">Painel: {{ torcida.nome }}</p>
    </div>

    <div class="space-y-4">
        {% for p in pendentes %}
        <div class="bg-white p-5 rounded-[32px] border border-gray-100 flex items-center justify-between shadow-xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-[#1A1A1A] font-black italic border border-white/10">
                    {{ p.user.username|slice:":1"|upper }}
                </div>
                <div>
                    <h4 class="text-[#1A1A1A] text-xs font-black uppercase italic leading-none">{{ p.user.username }}</h4>
                    <p class="text-gray-400 text-[8px] uppercase font-bold mt-1">CPF: {{ p.cpf|default:"Não inf." }}</p>
                </div>
            </div>
            
            <form action="{% url 'aprovar_membro' p.id %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="bg-green-600 hover:bg-green-500 text-[#1A1A1A] w-10 h-10 rounded-xl flex items-center justify-center transition-all active:scale-90">
                    <i class="bi bi-check-lg text-xl"></i>
                </button>
            </form>
        </div>
        {% empty %}
        <div class="py-20 text-center opacity-30">
            <i class="bi bi-shield-check text-5xl text-gray-400"></i>
            <p class="text-[#1A1A1A] text-[10px] font-black uppercase mt-4">Nenhum pedido pendente</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
