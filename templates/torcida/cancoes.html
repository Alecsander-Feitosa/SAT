{% extends "base.html" %}
{% block content %}
<div class="min-h-screen fundo-app px-5 pt-10 pb-40">
    <div class="flex items-center gap-4 mb-8">
        <a href="javascript:history.back()" class="texto-main text-2xl no-underline hover:opacity-70 transition-opacity"><i class="bi bi-arrow-left"></i></a>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter texto-main">NOSSAS <span class="texto-tema">CANÇÕES</span></h1>
    </div>

    <div class="space-y-4">
        {% for cancao in cancoes %}
        <div class="fundo-card p-5 rounded-3xl border border-suave shadow-sm">
            <h4 class="texto-tema font-black uppercase italic text-sm mb-2">{{ cancao.titulo }}</h4>
            <p class="texto-main opacity-80 text-xs leading-relaxed font-medium whitespace-pre-line">{{ cancao.letra }}</p>
        </div>
        {% empty %}
        <p class="text-center text-xs opacity-50 texto-main">Nenhuma canção adicionada.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
