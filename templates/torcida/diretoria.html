{% extends "base.html" %}
{% block content %}
<div class="min-h-screen fundo-app px-5 pt-10 pb-40">
    <div class="flex items-center gap-4 mb-8">
        <a href="javascript:history.back()" class="texto-main text-2xl no-underline hover:opacity-70 transition-opacity"><i class="bi bi-arrow-left"></i></a>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter texto-main">CORPO <span class="texto-tema">DIRETIVO</span></h1>
    </div>

    <div class="space-y-4">
        {% for membro in membros %}
        <div class="fundo-card p-4 rounded-3xl border border-suave flex items-center gap-4 shadow-sm">
            <div class="w-16 h-16 fundo-tema rounded-2xl flex items-center justify-center texto-claro font-black italic shadow-lg overflow-hidden">
                {% if membro.foto %}
                    <img src="{{ membro.foto.url }}" class="w-full h-full object-cover">
                {% else %}
                    <i class="bi bi-person-fill text-2xl"></i>
                {% endif %}
            </div>
            <div>
                <h4 class="texto-main font-black uppercase italic text-sm">{{ membro.nome }}</h4>
                <p class="texto-main opacity-50 text-[10px] uppercase font-bold tracking-widest">{{ membro.cargo }}</p>
            </div>
        </div>
        {% empty %}
        <p class="text-center text-xs opacity-50 texto-main">Diretoria não cadastrada.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
