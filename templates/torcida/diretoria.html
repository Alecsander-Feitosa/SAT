{% extends "base.html" %}
{% block content %}
<div class="min-h-screen bg-[#0c0d0e] px-5 pt-10 pb-40">
    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'torcida' %}" class="text-white text-2xl no-underline"><i class="bi bi-arrow-left"></i></a>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">CORPO <span class="text-[#D37129]">DIRETIVO</span></h1>
    </div>

    <div class="space-y-4">
        <div class="bg-[#161b22] p-4 rounded-3xl border border-white/5 flex items-center gap-4">
            <div class="w-16 h-16 bg-[#D37129] rounded-2xl flex items-center justify-center text-white font-black italic shadow-lg">
                SAT
            </div>
            <div>
                <h4 class="text-white font-black uppercase italic text-sm">Presidência</h4>
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Gestão Geral SAT</p>
            </div>
        </div>

        <div class="bg-[#161b22] p-4 rounded-3xl border border-white/5 flex items-center gap-4">
            <div class="w-16 h-16 bg-gray-800 rounded-2xl flex items-center justify-center text-[#D37129]">
                <i class="bi bi-shield-lock-fill text-2xl"></i>
            </div>
            <div>
                <h4 class="text-white font-black uppercase italic text-sm">Conselho de Ética</h4>
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Regras e Disciplina</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
