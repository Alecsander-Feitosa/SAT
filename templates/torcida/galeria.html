{% extends "base.html" %}
{% block content %}
<div class="min-h-screen fundo-app px-5 pt-10 pb-40">
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <a href="javascript:history.back()" class="texto-main text-2xl no-underline hover:opacity-70 transition-opacity"><i class="bi bi-arrow-left"></i></a>
            <h1 class="text-2xl font-black italic uppercase texto-main">GALERIA</h1>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-1">
        {% for foto in fotos %}
        <div class="aspect-square fundo-card overflow-hidden border border-suave shadow-sm relative group">
            <img src="{{ foto.imagem.url }}" class="w-full h-full object-cover">
            {% if foto.legenda %}
                <div class="absolute bottom-0 left-0 right-0 bg-black/60 p-1 text-[8px] text-white text-center opacity-0 group-hover:opacity-100 transition-opacity">
                    {{ foto.legenda }}
                </div>
            {% endif %}
        </div>
        {% empty %}
        <p class="col-span-3 text-center text-xs opacity-50 texto-main mt-5">Nenhuma foto adicionada à galeria ainda.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
