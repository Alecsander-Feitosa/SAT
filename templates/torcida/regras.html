{% extends "base.html" %}
{% block content %}
<div class="min-h-screen fundo-app px-5 pt-10 pb-40">
    <div class="flex items-center gap-4 mb-8">
       <a href="javascript:history.back()" class="texto-main text-2xl no-underline hover:opacity-70 transition-opacity"><i class="bi bi-arrow-left"></i></a>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter texto-main">CÓDIGO DE <span class="texto-tema">CONDUTA</span></h1>
    </div>

    <div class="space-y-3">
        {% for regra in regras %}
        <div class="fundo-card p-5 rounded-[28px] {% if forloop.first %}border-l-4 border-tema{% else %}border-l-4 border-suave{% endif %} shadow-sm">
            <span class="text-[10px] font-black {% if forloop.first %}texto-tema{% else %}texto-main opacity-50{% endif %} uppercase tracking-widest">Regra #{{ regra.ordem|stringformat:"02d" }}</span>
            <h4 class="texto-main font-bold text-sm mt-1 uppercase">{{ regra.titulo }}</h4>
            <p class="texto-main opacity-70 text-[11px] mt-2 leading-relaxed">
                {{ regra.descricao }}
            </p>
        </div>
        {% empty %}
        <p class="text-center text-xs opacity-50 texto-main">Nenhuma regra cadastrada.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
