{% extends "base.html" %}
{% block content %}
<div class="min-h-screen bg-[#0c0d0e] px-5 pt-10 pb-40">
    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'torcida' %}" class="text-white text-2xl no-underline"><i class="bi bi-arrow-left"></i></a>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">CARAVANAS <span class="text-[#D37129]">SAT</span></h1>
    </div>

    <div class="space-y-4">
        <div class="bg-[#161b22] rounded-[32px] p-5 border border-white/5">
            <div class="flex justify-between items-start mb-4">
                <span class="bg-[#D37129] text-black text-[9px] font-black px-3 py-1 rounded-full uppercase italic">Vagas Abertas</span>
                <span class="text-white font-black text-sm">R$ 120,00</span>
            </div>
            <div class="flex items-center gap-4 mb-4">
                <div class="text-center">
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Origem</p>
                    <p class="text-white font-black uppercase">Sede</p>
                </div>
                <div class="flex-grow border-b border-dashed border-gray-700 relative">
                    <i class="bi bi-bus-front-fill absolute -top-2 left-1/2 -translate-x-1/2 text-[#D37129]"></i>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Destino</p>
                    <p class="text-white font-black uppercase">Estádio</p>
                </div>
            </div>
            <button class="w-full bg-white/5 text-white py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest border border-white/10">Reservar Poltrona</button>
        </div>
    </div>
</div>
{% endblock %}
