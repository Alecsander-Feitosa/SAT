{% extends "base.html" %}
{% block content %}

<div class="p-6">


    <div class="text-center mb-8">
        <h2 class="text-2xl font-black uppercase italic text-[#1A1A1A]">Escolha sua Torcida</h2>
        <p class="text-gray-400 text-xs uppercase font-bold tracking-widest mt-1">Conecte-se à sua família no estádio</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        {% for torcida in torcidas %}
        <a href="{% url 'vincular_torcida' torcida.id %}" 
           class="bg-white border border-gray-100 rounded-3xl p-5 text-center hover:border-[#D37129] transition-all group no-underline">
            <div class="w-20 h-20 mx-auto mb-3 bg-white rounded-full flex items-center justify-center p-2 shadow-lg group-hover:scale-110 transition-transform">
                {% if torcida.escudo %}
                    <img src="{{ torcida.escudo.url }}" alt="{{ torcida.nome }}" class="max-h-full max-w-full object-contain">
                {% else %}
                    <i class="bi bi-shield-shaded text-3xl text-gray-300"></i>
                {% endif %}
            </div>
            <h3 class="text-[#1A1A1A] text-[10px] font-black uppercase truncate">{{ torcida.nome }}</h3>
        </a>
        {% endfor %}
    </div>

    <div class="mt-auto pt-6 border-t border-gray-100 text-center">
        <p class="text-gray-400 text-[10px] font-bold uppercase mb-4">Ou se preferir...</p>
        <a href="{% url 'dashboard' %}" class="inline-block w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-gray-400 text-[11px] font-black uppercase tracking-widest hover:bg-white/10 no-underline">
            Continuar sem torcida (Acesso Limitado)
        </a>
    </div>
</div>
{% endblock %}
